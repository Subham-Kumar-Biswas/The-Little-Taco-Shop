<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="This is a website for The Little Taco Shop."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Little Taco Shop</title>
    <link rel="icon" href="image/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer></script>
  </head>

  <body>
    <header class="header">
      <h1 class="header__h1">Little Taco Shop</h1>

      <nav class="header__nav">
        <ul class="header__ul">
          <li>
            <a href="index.html">Home</a>
          </li>
          <li>
            <a href="index.html#menu">Menu</a>
          </li>
          <li><a href="hours.html">Hours</a></li>
          <li>
            <a href="about.html">About</a>
          </li>
        </ul>
      </nav>
    </header>

    <section class="hero">
      <figure>
        <img
          src="image/tacos_close_up_1000x649.png"
          alt="Little Taco Shop's Deliscious Tacos"
          title="Little Taco Shop's Deliscious Tacos"
          width="1000"
          height="649"
        />
        <figcaption class="offscreen">Little Taco Shop Tacos</figcaption>
      </figure>
    </section>

    <main class="main">
      <article class="main__article">
        <h2 class="contact__h2">Our Location</h2>

        <address>
          555 Taco Temptation Lane, Suite T <br />
          Kansas City, MO 55555-55555
        </address>

        <p>Phone: <a href="tel:+15555555555">555-555-5555</a></p>
      </article>

      <article class="main__article">
        <h2 class="contact__h2">Our Contact Form</h2>

        <form
          action="https://httpbin.org/post"
          method="post"
          class="contact__form"
        >
          <fieldset class="contact__fieldset">
            <legend class="offscreen">Send Us A Message</legend>

            <p class="contact__p">
              <label class="contact__label" for="name">Name:</label>
              <input
                class="contact__input"
                type="text"
                name="name"
                id="name"
                placeholder="Your name"
                required
              />
            </p>

            <p class="contact__p">
              <label class="contact__label" for="mail">Email:</label>
              <input
                class="contact__input"
                type="email"
                name="mail"
                id="mail"
                placeholder="Your email"
                required
              />
            </p>

            <p class="contact__p">
              <label class="contact__label" for="message">Your Message:</label
              ><br />
              <textarea
                class="contact__textarea"
                name="message"
                id="message"
                cols="30"
                rows="10"
                placeholder="Type your message here"
              ></textarea>
            </p>
          </fieldset>

          <button class="contact__button" type="submit">Submit</button>
          <button class="contact__button" type="reset">Reset</button>
        </form>
      </article>

      <p class="center">
        <a href="#">Back to Top</a>
      </p>
    </main>

    <footer class="footer">
      <p>
        <span class="nowrap">Copyright &copy; <time id="year"></time></span>
        <span class="nowrap">The Little Taco Shop</span>
      </p>
    </footer>
  </body>
</html>
